  cm-004-immutable-field:
    code_correctness:
      judge_type: llm
      rationale: "The agent's implementation has several notable deviations from the\
        \ reference:\n\n1. **Non-pointer type**: The field is declared as `string`\
        \ instead of `*string`. The reference explicitly requires a pointer type (`*string`)\
        \ for the optional field. This is significant because it affects how `omitempty`\
        \ works with JSON serialization and how CEL rules evaluate presence via `has()`.\
        \ With a non-pointer string, `omitempty` will omit the zero value `\"\"` but\
        \ the field is never truly \"absent\" in Go — this changes deepcopy behavior\
        \ and CEL evaluation semantics.\n\n2. **CEL rule structure differs from reference**:\
        \ The reference specifies two separate XValidation markers following the established\
        \ two-rule pattern used for `IssuerRef` and `privateKeyAlgorithm`:\n   - Rule\
        \ 1 (presence): `!has(oldSelf.tlsMinVersion) || has(self.tlsMinVersion)` \n\
        \   - Rule 2 (value): `!has(self.tlsMinVersion) || self.tlsMinVersion == oldSelf.tlsMinVersion`\n\
        \   \n   The agent instead uses a different approach: one rule at the struct\
        \ level (`!has(oldSelf.tlsMinVersion) && !has(self.tlsMinVersion) || has(oldSelf.tlsMinVersion)\
        \ && has(self.tlsMinVersion)`) and one at the field level (`self == oldSelf`).\
        \ The struct-level presence rule is overly restrictive — it prevents adding\
        \ the field after creation (`!has(oldSelf) && !has(self)` means if it wasn't\
        \ set initially, it can never be set), which is stricter than the reference's\
        \ behavior that only prevents removal. The agent's message even says \"may\
        \ only be configured during creation\" confirming this semantic difference.\n\
        \n3. **Mutation function approach**: The agent integrates into the existing\
        \ `updateArgList` function rather than creating a separate `updateTLSMinVersion`\
        \ mutation function following the typed function pattern. While this may work\
        \ functionally, it doesn't follow the reference's pattern of a separate chained\
        \ mutation function. Also, checking `!= \"\"` instead of `!= nil` matches\
        \ their non-pointer type but differs from the reference pattern.\n\n4. **Kubebuilder\
        \ markers**: The markers are syntactically valid, and the Enum values are\
        \ correct. The `+optional` tag is included which is fine.\n\nThe code would\
        \ likely compile and partially work, but the semantic differences in CEL rules\
        \ (overly restrictive immutability) and the non-pointer type are meaningful\
        \ functional issues."
      value: 3
    consulted_docs:
      judge_type: builtin
      rationale: Read 0/2 expected docs (coverage 0%, threshold 0%)
