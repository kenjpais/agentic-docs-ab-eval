        deviations:


        1. **CEL validation pattern**: The reference uses two separate XValidation
        markers on the field itself (the same two-rule pattern used for `IssuerRef`
        and `privateKeyAlgorithm`), but the agent splits them across the type level
        and field level with different rule formulations. The presence-immutability
        rule is placed on `IstioCSRConfig` type instead of on the field, and uses
        a different CEL expression (`!has(oldSelf.tlsMinVersion) && !has(self.tlsMinVersion)
        || has(oldSelf.tlsMinVersion) && has(self.tlsMinVersion)`) that is semantically
        more restrictive — it prevents adding the field after creation even if it
