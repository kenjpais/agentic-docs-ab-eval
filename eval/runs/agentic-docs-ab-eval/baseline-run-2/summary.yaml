  cm-004-immutable-field:
    code_correctness:
      judge_type: llm
      rationale: 'The agent''s implementation has several notable deviations from
        the reference and some correctness issues:


        1. **Non-pointer type**: The field is declared as `string` instead of `*string`.
        The reference specifies a pointer type (`*string`) for the optional field.
        With a plain `string`, the `omitempty` tag will treat an empty string as unset,
        but more critically, the `has()` CEL function used in the struct-level validation
        works differently with non-pointer/non-optional fields — for a required string
        field, `has()` always returns true, which would break the presence-immutability
        logic.


        2. **Incorrect CEL presence-immutability rule**: The struct-level rule `!has(oldSelf.tlsMinVersion)
        && !has(self.tlsMinVersion) || has(oldSelf.tlsMinVersion) && has(self.tlsMinVersion)`
        is logically wrong. This is a biconditional (both must be present or both
        must be absent), which means you can NEVER set the field after initial creation
        if it wasn''t set at creation time, AND you can never unset it. The reference
        pattern `!has(oldSelf.field) || has(self.field)` only prevents removal (set→unset),
        allowing initial setting (unset→set). The agent''s rule is overly restrictive.


        3. **Not using separate mutation function pattern**: The reference asks for
        a separate `updateTLSMinVersion` mutation function following the typed `deploymentMutationFunc`
        pattern and chaining it in the pipeline. Instead, the agent adds the logic
        inline within the existing `updateArgList` function. While functionally this
        may work for adding the arg, it doesn''t follow the required architectural
        pattern.


        4. **Field-level CEL rule `self == oldSelf`**: This is correct for value immutability
        on a simple type and is a valid simplification since at the field level, `self`
        refers to the field value directly. This part is fine.


        5. **Kubebuilder markers are syntactically valid** and the enum values are
        correct.


        The code would likely compile but the presence-immutability CEL rule has incorrect
        semantics (too restrictive), the type is wrong (not a pointer), and the mutation
        pattern doesn''t match the expected architecture.'
      value: 3
    consulted_docs:
      judge_type: builtin
      rationale: Read 0/2 expected docs (coverage 0%, threshold 0%)
      value: true
    convention_adherence:
      judge_type: llm
      rationale: 'The implementation has several convention deviations from the reference:


        1. **Non-pointer type**: The field uses `string` instead of `*string` (pointer
        type). The reference explicitly requires a pointer type for optional fields,
        and this is important for distinguishing between "not set" and "empty string"
        in Go. The agent even checks `!= ""` instead of `!= nil` in the deployment
        code.


        2. **CEL rule pattern diverges from codebase convention**: The reference specifies
        two separate XValidation markers on the field itself following the exact pattern
        used for `IssuerRef` and `privateKeyAlgorithm` in the same file. The agent
        instead splits them across two locations — one on the struct and one on the
        field — and uses a different logical formulation for the presence check (`!has(oldSelf.x)
        && !has(self.x) || has(oldSelf.x) && has(self.x)` vs the reference''s `!has(oldSelf.x)
        || has(self.x)`). While logically equivalent, it doesn''t match the established
        two-rule-on-field pattern. Furthermore, the presence-immutability rule as
        written on the struct level actually prevents setting the field after creation
        even when it wasn''t previously set (it requires both to be absent or both
        present), which is overly restrictive and incorrect — it should allow unset
        → set transitions.


        3. **Deployment mutation pattern**: The reference calls for a separate named
        mutation function (`updateTLSMinVersion`) following the typed `deploymentMutationFunc`
        pattern chained in the pipeline, consistent with the "Deployment mutation
        pattern" convention. The agent instead adds the logic inline within the existing
        `updateArgList` function. While this works functionally, it doesn''t follow
        the convention of separate named mutation functions chained in a pipeline.


        4. **Make target order**: The agent states `make generate` before `make manifests`,
        but the convention specifies `make manifests` MUST precede `make generate`.
        However, looking more carefully, the agent''s instructions say to run them
        in the order listed, which has `make generate` first — this contradicts the
