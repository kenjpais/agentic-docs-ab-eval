        However, there are a few notable differences from the reference implementation:


        1. **Signature mismatch for `NewProxyInformerIfAvailable`**: The reference
        specifies `(ctx context.Context, discoveryClient discovery.DiscoveryInterface,
        configInformerFactory configinformers.SharedInformerFactory)` taking a pre-existing
