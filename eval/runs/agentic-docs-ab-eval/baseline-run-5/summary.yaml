  cm-004-immutable-field:
    code_correctness:
      judge_type: llm
      rationale: 'The implementation has several notable deviations from the reference
        that affect correctness:


        1. **Non-pointer type for TLSMinVersion**: The agent uses `TLSMinVersion string`
        instead of `TLSMinVersion *string`. The reference explicitly requires a pointer
        type (`*string`) for the optional field. This is significant because with
        a non-pointer string, the `omitempty` tag will treat an empty string as absent,
        but CEL `has()` semantics differ — a non-pointer field is always "present"
        in the Go/CRD sense, which changes how CEL validation rules behave. The field-level
        CEL rule `self == oldSelf` works differently for a required-in-schema string
        vs an optional pointer field.


        2. **CEL immutability pattern differs significantly**: The reference uses
        two separate XValidation markers on the field itself: (a) `!has(oldSelf.tlsMinVersion)
        || has(self.tlsMinVersion)` for presence-immutability and (b) `!has(self.tlsMinVersion)
        || self.tlsMinVersion == oldSelf.tlsMinVersion` for value-immutability. The
        agent instead puts the presence-immutability rule on the parent struct `IstioCSRConfig`
        and uses a simple `self == oldSelf` on the field. The `self == oldSelf` rule
        on a non-pointer string field would prevent ANY change to the value (including
        setting it for the first time from empty string to a value), which is NOT
        the desired behavior — the reference wants it to be settable once at creation
        and then immutable. Furthermore, the presence-immutability rule on the struct
        level `!has(oldSelf.tlsMinVersion) && !has(self.tlsMinVersion) || has(oldSelf.tlsMinVersion)
        && has(self.tlsMinVersion)` would prevent ever setting the field if it wasn''t
        set at creation, which contradicts the "immutable once set" semantics — it
        effectively makes it "only configurable during creation" as the message says.
        The agent''s own summary table confirms this undesirable behavior: "Create
        without tlsMinVersion, later add it → Rejected."


        3. **Mutation function approach differs**: Instead of creating a separate
        `updateTLSMinVersion` mutation function following the typed function pattern
        and chaining it in the pipeline (as the reference specifies), the agent embeds
        the logic directly in `updateArgList`. This doesn''t follow the existing pattern
        of typed `deploymentMutationFunc` functions. The check uses `!= ""` instead
        of `!= nil` (consistent with the non-pointer type choice but still wrong per
        the reference).


        The kubebuilder markers are syntactically valid, the enum values are correct,
        and the code would likely compile. But the semantic behavior of the immutability
        validation is wrong (too restrictive — prevents setting the field after creation
        even if it was never set), and the implementation pattern for the mutation
        function doesn''t match the reference architecture.'
      value: 3
