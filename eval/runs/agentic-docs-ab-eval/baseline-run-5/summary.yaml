        2. **CEL rule pattern mismatch**: The reference uses two separate `XValidation`
        markers on the field itself following the exact same two-rule pattern as `IssuerRef`
        and `privateKeyAlgorithm` in the same file: `!has(oldSelf.field) || has(self.field)`
        and `!has(self.field) || self.field == oldSelf.field`. The agent instead splits
