        **Convention deviations:**

        1. **Non-pointer type**: The field uses `string` instead of `*string`. The
        reference implementation specifies a pointer type (`*string`) for the optional
        field, which is the standard Go/Kubernetes convention for optional fields
        that need nil-vs-empty distinction. The existing `IssuerRef` and `privateKeyAlgorithm`
        fields in the same file likely use pointer types for their optional immutable
