  cm-004-immutable-field:
    code_correctness:
      judge_type: llm
      rationale: "The implementation has several notable deviations from the reference:\n\
        \n1. **Non-pointer type**: The field is declared as `TLSMinVersion string`\
        \ instead of `*string`. The reference explicitly requires a pointer type (`*string`)\
        \ for the optional field. This is important because with a plain string, the\
        \ `omitempty` tag means the zero value (\"\") is omitted, but for CEL validation\
        \ with `has()`, pointer types behave differently from value types. The `has()`\
        \ function works correctly with optional pointer fields but behaves differently\
        \ with value-type fields.\n\n2. **CEL rule structure differs significantly**:\
        \ The reference requires two separate XValidation markers following the established\
        \ pattern in the codebase:\n   - `!has(oldSelf.tlsMinVersion) || has(self.tlsMinVersion)`\
        \ (presence-immutability)\n   - `!has(self.tlsMinVersion) || self.tlsMinVersion\
        \ == oldSelf.tlsMinVersion` (value-immutability)\n   \n   The agent instead\
        \ uses a combined presence rule on the struct level (`!has(oldSelf.tlsMinVersion)\
        \ && !has(self.tlsMinVersion) || has(oldSelf.tlsMinVersion) && has(self.tlsMinVersion)`)\
        \ and a simple `self == oldSelf` on the field. The struct-level presence rule\
        \ is semantically different - it prevents setting the field after creation\
        \ (unset → set is rejected), which is overly restrictive. The summary table\
        \ even confirms this incorrect behavior: \"Update: unset → VersionTLS12\"\
        \ is listed as **Rejected**, which contradicts the intended immutability semantics\
        \ (should allow initial setting, just not changing/removing once set).\n\n\
        3. **Mutation function approach**: Instead of creating a separate `updateTLSMinVersion`\
        \ mutation function following the typed function pattern and chaining it in\
        \ the pipeline, the agent adds the logic inline in the existing `updateArgList`\
        \ function. While this works functionally, it doesn't follow the reference's\
        \ typed function pattern (`deploymentMutationFunc`).\n\n4. **Kubebuilder markers\
        \ are syntactically valid** and the enum values (VersionTLS12, VersionTLS13)\
        \ are correct.\n\nThe fundamental semantic error in the CEL validation (preventing\
        \ initial setting of the field) is a significant functional bug that would\
        \ cause incorrect behavior in production."
      value: 3
    consulted_docs:
      judge_type: builtin
      rationale: Read 0/2 expected docs (coverage 0%, threshold 0%)
      value: true
    convention_adherence:
      judge_type: llm
      rationale: 'The implementation is partially idiomatic but has several convention
        deviations:


        1. **CEL XValidation pattern**: The reference calls for two separate XValidation
        markers following the exact pattern used for `IssuerRef` and `privateKeyAlgorithm`
        in the same file: `!has(oldSelf.field) || has(self.field)` and `!has(self.field)
        || self.field == oldSelf.field`. The agent instead uses a combined single
        rule on the struct level (`!has(oldSelf.tlsMinVersion) && !has(self.tlsMinVersion)
        || has(oldSelf.tlsMinVersion) && has(self.tlsMinVersion)`) plus `self == oldSelf`
        on the field. While it claims to follow the existing pattern, the presence-immutability
        rule is combined into one expression rather than two separate markers. Moreover,
        the agent''s presence rule actually **blocks** the unset→set transition, which
        is incorrect behavior (it should allow setting the field for the first time
