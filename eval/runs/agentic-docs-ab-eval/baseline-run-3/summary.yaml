  cm-004-immutable-field:
    code_correctness:
      judge_type: llm
      rationale: 'The implementation has several notable deviations from the reference:


        1. **Non-pointer type**: The field is declared as `TLSMinVersion string` instead
        of `TLSMinVersion *string`. The reference explicitly requires a pointer type
        (`*string`) for the optional field. This affects how the omitempty behavior
        works and how nil checks are performed.


        2. **CEL rule structure differs significantly**: The reference requires two
        separate XValidation markers on the field itself using `has()` patterns: one
        for presence-immutability (`!has(oldSelf.tlsMinVersion) || has(self.tlsMinVersion)`)
        and one for value-immutability (`!has(self.tlsMinVersion) || self.tlsMinVersion
        == oldSelf.tlsMinVersion`). The agent instead uses a single presence-immutability
        rule on the struct type level and a simple `self == oldSelf` on the field.
        The struct-level rule `!has(oldSelf.tlsMinVersion) && !has(self.tlsMinVersion)
        || has(oldSelf.tlsMinVersion) && has(self.tlsMinVersion)` is logically different
        — it prevents setting the field after creation (set→set is ok, unset→unset
        is ok, but unset→set is blocked), which is NOT the desired behavior. The reference
        wants to allow initial setting but prevent removal or changes.


        3. **Mutation function pattern differs**: Instead of creating a separate `updateTLSMinVersion`
        function following the typed `deploymentMutationFunc` pattern and chaining
        it in the pipeline, the agent adds the logic inline within the existing `updateArgList`
        function. This doesn''t follow the mutation pipeline pattern specified in
        the reference.


        4. **Nil check differs due to non-pointer type**: Because the type is `string`
        not `*string`, the check uses `!= ""` instead of `!= nil`, which is consistent
        with the chosen type but inconsistent with the reference requirement.


        The kubebuilder marker syntax is valid, the enum values are correct, and the
        deployment args logic would functionally work. However, the CEL logic is semantically
        wrong (it would prevent setting the field after creation rather than making
        it immutable once set), and the type and pattern choices don''t match the
        reference.'
      value: 3
