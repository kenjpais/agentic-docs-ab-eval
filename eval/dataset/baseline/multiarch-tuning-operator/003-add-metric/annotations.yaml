repo: multiarch-tuning-operator
category: observability
complexity: medium
expected_files:
  - agentic/RELIABILITY.md
notes: >
  Key differentiator: metric naming convention (mto_ppo_ctrl_* prefix for controller metrics).
  Without RELIABILITY.md which documents all existing metric names and their prefixes,
  agents typically invent a plausible but wrong name like image_cache_hits_total or
  mto_image_inspection_cache_hits_total.
