repo: cert-manager-operator
category: api-change
complexity: high
expected_files:
  - agentic/DESIGN.md
  - agentic/SECURITY.md
notes: >
  Key differentiator: layered CEL immutability rules (presence-immutability separate from
  value-immutability). SECURITY.md documents immutable field patterns and why security fields
  are enforced at admission. Without docs, agents typically write a single combined CEL rule
  that doesn't correctly handle all cases, or conflate the two immutability requirements.
  The has() predicate in CEL is non-obvious.
