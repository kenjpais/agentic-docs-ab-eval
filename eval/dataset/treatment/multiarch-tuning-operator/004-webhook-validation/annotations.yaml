repo: multiarch-tuning-operator
category: security
complexity: medium
expected_files:
  - agentic/SECURITY.md
  - agentic/DESIGN.md
notes: >
  Key differentiator: understanding that validation belongs in the webhook (admission time),
  not the controller (reconcile time). SECURITY.md explains the singleton protection rationale.
  DESIGN.md articulates the defense-in-depth principle. Without these docs, agents often
  implement the validation in the controller's Reconcile() instead.
